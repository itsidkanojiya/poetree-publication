name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "🚀 Deploy started on VPS"

            # ===== FRONTEND =====
            cd /var/www/poetreefrontend/poetree-publication

            # 1) Backup VPS .env so pull never overwrites it
            if [ -f .env ]; then
              cp .env .env.vps
              echo "📋 Backed up .env to .env.vps"
            fi

            # 2) Pull latest code (repo must not track .env — see .gitignore)
            git pull origin main

            # 3) Restore VPS .env so build uses your API URL etc.
            if [ -f .env.vps ]; then
              cp .env.vps .env
              echo "📋 Restored .env from .env.vps"
            elif [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
              echo "⚠️ No .env.vps found — copied .env.example. Add your real .env on VPS and save as .env.vps for next deploy."
            fi

            if [ ! -f .env ]; then
              echo "❌ No .env on VPS. Create .env (or .env.vps) with VITE_API_URL and run deploy again."
              exit 1
            fi

            echo "📌 Deployed commit: $(git rev-parse --short HEAD)"

            npm install
            npm run build

            echo "📦 Build done at $(date -u)"

            # ===== NGINX =====
            nginx -t
            systemctl reload nginx

            echo "✅ Deploy finished successfully"
